<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background -->
  <rect width="300" height="400" fill="#ffffff"/>

  <!-- Centered header area -->
  <!-- Photo circle centered -->
  <circle cx="150" cy="44" r="24" fill="#93c5d4"/>

  <!-- Name (uppercase, centered, navy) -->
  <rect x="70" y="76" width="160" height="10" rx="2" fill="#1e3a5f" opacity="0.9"/>
  <!-- Title -->
  <rect x="95" y="92" width="110" height="7" rx="2" fill="#6b7280" opacity="0.7"/>
  <!-- Contact row centered -->
  <rect x="60" y="105" width="60" height="5" rx="2" fill="#9ca3af"/>
  <rect x="128" y="105" width="60" height="5" rx="2" fill="#9ca3af"/>
  <rect x="196" y="105" width="44" height="5" rx="2" fill="#9ca3af"/>

  <!-- "LEBENSLAUF" label centered -->
  <rect x="85" y="120" width="130" height="10" rx="2" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="132" width="260" height="2" fill="#1e3a5f"/>

  <!-- Underlined section title: Berufserfahrung -->
  <rect x="20" y="144" width="160" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="153" width="260" height="1" fill="#1e3a5f"/>
  <!-- Entry -->
  <rect x="20" y="160" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="160" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="170" width="100" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="178" width="240" height="4" rx="1" fill="#d1d5db"/>

  <rect x="20" y="190" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="190" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="200" width="100" height="5" rx="1" fill="#9ca3af"/>

  <!-- Underlined section title: Ausbildung -->
  <rect x="20" y="218" width="100" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="227" width="260" height="1" fill="#1e3a5f"/>
  <rect x="20" y="234" width="140" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="234" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="244" width="110" height="5" rx="1" fill="#9ca3af"/>

