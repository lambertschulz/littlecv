  <rect x="20" y="262" width="90" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="271" width="260" height="1" fill="#1e3a5f"/>
  <!-- Skills as label + level rows -->
  <rect x="20" y="278" width="120" height="5" rx="1" fill="#374151"/>
  <rect x="200" y="278" width="80" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="278" width="260" height="0.5" fill="#e5e7eb" y="286"/>
  <rect x="20" y="290" width="100" height="5" rx="1" fill="#374151"/>
  <rect x="200" y="290" width="60" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="298" width="260" height="0.5" fill="#e5e7eb"/>
  <rect x="20" y="302" width="130" height="5" rx="1" fill="#374151"/>
  <rect x="200" y="302" width="70" height="5" rx="1" fill="#9ca3af"/>
