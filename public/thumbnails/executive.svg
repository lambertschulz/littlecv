<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <!-- Background -->
  <rect width="300" height="400" fill="#ffffff"/>

  <!-- Header: name block centered -->
  <text x="150" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#292524" text-anchor="middle" letter-spacing="4" text-transform="uppercase">VOLLSTÄNDIGER NAME</text>

  <!-- Double line under name -->
  <line x1="40" y1="52" x2="260" y2="52" stroke="#292524" stroke-width="1"/>
  <line x1="40" y1="56" x2="260" y2="56" stroke="#292524" stroke-width="1"/>

  <!-- Title -->
  <text x="150" y="72" font-family="Georgia, serif" font-size="8" fill="#6b7280" text-anchor="middle">Berufsbezeichnung</text>

  <!-- Contact info centered with dots -->
  <text x="150" y="86" font-family="Georgia, serif" font-size="7" fill="#9ca3af" text-anchor="middle">email@example.com · +49 123 456 · Stadt</text>

  <!-- Section 1: Berufserfahrung -->
  <text x="40" y="106" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#292524" letter-spacing="2">BERUFSERFAHRUNG</text>
  <line x1="40" y1="110" x2="260" y2="110" stroke="#292524" stroke-width="1"/>

  <!-- Entry 1 -->
  <text x="40" y="122" font-family="Georgia, serif" font-size="7.5" font-weight="bold" fill="#1f2937">Position / Unternehmen</text>
  <text x="260" y="122" font-family="Georgia, serif" font-size="6.5" fill="#9ca3af" text-anchor="end">2020 – heute</text>
  <text x="40" y="133" font-family="Georgia, serif" font-size="6.5" fill="#6b7280" font-style="italic">Unternehmen GmbH, Stadt</text>
  <text x="40" y="143" font-family="Georgia, serif" font-size="6.5" fill="#374151">Beschreibung der Tätigkeit und Verantwortlichkeiten.</text>

  <!-- Entry 2 -->
  <text x="40" y="157" font-family="Georgia, serif" font-size="7.5" font-weight="bold" fill="#1f2937">Weitere Position</text>
  <text x="260" y="157" font-family="Georgia, serif" font-size="6.5" fill="#9ca3af" text-anchor="end">2017 – 2020</text>
  <text x="40" y="168" font-family="Georgia, serif" font-size="6.5" fill="#6b7280" font-style="italic">Anderes Unternehmen AG</text>

  <!-- Section 2: Ausbildung -->
  <text x="40" y="190" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#292524" letter-spacing="2">AUSBILDUNG</text>
  <line x1="40" y1="194" x2="260" y2="194" stroke="#292524" stroke-width="1"/>

  <!-- Entry -->
  <text x="40" y="206" font-family="Georgia, serif" font-size="7.5" font-weight="bold" fill="#1f2937">Master of Science</text>
  <text x="260" y="206" font-family="Georgia, serif" font-size="6.5" fill="#9ca3af" text-anchor="end">2015 – 2017</text>
  <text x="40" y="217" font-family="Georgia, serif" font-size="6.5" fill="#6b7280" font-style="italic">Universität Musterstadt</text>

  <!-- Section 3: Kenntnisse -->
  <text x="40" y="240" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#292524" letter-spacing="2">KENNTNISSE</text>
  <line x1="40" y1="244" x2="260" y2="244" stroke="#292524" stroke-width="1"/>

  <!-- Skill lines -->
  <text x="40" y="256" font-family="Georgia, serif" font-size="7" fill="#374151">Projektmanagement — Experte</text>
  <text x="40" y="267" font-family="Georgia, serif" font-size="7" fill="#374151">Strategieentwicklung — Fortgeschritten</text>
  <text x="40" y="278" font-family="Georgia, serif" font-size="7" fill="#374151">Führungskompetenz — Experte</text>
</svg>
