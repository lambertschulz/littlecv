<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background -->
  <rect width="300" height="400" fill="#ffffff"/>

  <!-- Centered header area -->
  <!-- Photo circle centered -->
  <circle cx="150" cy="44" r="24" fill="#93c5d4"/>

  <!-- Name (uppercase, centered, navy) -->
  <rect x="70" y="76" width="160" height="10" rx="2" fill="#1e3a5f" opacity="0.9"/>
  <!-- Title -->
  <rect x="95" y="92" width="110" height="7" rx="2" fill="#6b7280" opacity="0.7"/>
  <!-- Contact row centered -->
  <rect x="60" y="105" width="60" height="5" rx="2" fill="#9ca3af"/>
  <rect x="128" y="105" width="60" height="5" rx="2" fill="#9ca3af"/>
  <rect x="196" y="105" width="44" height="5" rx="2" fill="#9ca3af"/>

  <!-- Underlined section title: Berufserfahrung -->
  <rect x="20" y="126" width="160" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="135" width="260" height="1" fill="#1e3a5f"/>
  <!-- Entry -->
  <rect x="20" y="142" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="142" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="152" width="100" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="160" width="240" height="4" rx="1" fill="#d1d5db"/>
  <rect x="20" y="168" width="200" height="4" rx="1" fill="#d1d5db"/>

  <rect x="20" y="178" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="178" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="188" width="100" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="196" width="220" height="4" rx="1" fill="#d1d5db"/>

  <!-- Underlined section title: Ausbildung -->
  <rect x="20" y="214" width="100" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="223" width="260" height="1" fill="#1e3a5f"/>
  <rect x="20" y="230" width="140" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="230" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="240" width="110" height="5" rx="1" fill="#9ca3af"/>

  <!-- Underlined section title: Kenntnisse -->
  <rect x="20" y="258" width="90" height="8" rx="1" fill="#1e3a5f" opacity="0.85"/>
  <rect x="20" y="267" width="260" height="1" fill="#1e3a5f"/>
  <!-- Skills as text-like line with dots -->
  <rect x="20" y="274" width="260" height="5" rx="1" fill="#6b7280" opacity="0.5"/>
  <rect x="20" y="284" width="180" height="5" rx="1" fill="#6b7280" opacity="0.5"/>
</svg>
