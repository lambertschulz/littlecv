<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background -->
  <rect width="300" height="400" fill="#ffffff"/>

  <!-- Blue accent bar at top -->
  <rect x="0" y="0" width="300" height="80" fill="#2563eb"/>

  <!-- Photo circle -->
  <circle cx="50" cy="56" r="24" fill="#93c5fd"/>

  <!-- Name line (white) -->
  <rect x="84" y="36" width="140" height="10" rx="2" fill="#ffffff" opacity="0.9"/>
  <!-- Title line (white, thinner) -->
  <rect x="84" y="52" width="100" height="7" rx="2" fill="#ffffff" opacity="0.6"/>
  <!-- Contact dots -->
  <rect x="84" y="66" width="50" height="5" rx="2" fill="#bfdbfe" opacity="0.8"/>
  <rect x="140" y="66" width="50" height="5" rx="2" fill="#bfdbfe" opacity="0.8"/>

  <!-- Divider line -->
  <rect x="20" y="90" width="260" height="2" fill="#2563eb"/>

  <!-- Section: Berufserfahrung -->
  <rect x="20" y="104" width="120" height="8" rx="2" fill="#2563eb" opacity="0.8"/>
  <rect x="20" y="116" width="260" height="1" fill="#3b82f6" opacity="0.5"/>
  <!-- Entry rows -->
  <rect x="20" y="124" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="124" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="134" width="100" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="142" width="240" height="4" rx="1" fill="#d1d5db"/>
  <rect x="20" y="150" width="200" height="4" rx="1" fill="#d1d5db"/>

  <rect x="20" y="162" width="150" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="162" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="172" width="100" height="5" rx="1" fill="#9ca3af"/>
  <rect x="20" y="180" width="240" height="4" rx="1" fill="#d1d5db"/>

  <!-- Section: Ausbildung -->
  <rect x="20" y="198" width="80" height="8" rx="2" fill="#2563eb" opacity="0.8"/>
  <rect x="20" y="210" width="260" height="1" fill="#3b82f6" opacity="0.5"/>
  <rect x="20" y="218" width="140" height="6" rx="1" fill="#374151"/>
  <rect x="220" y="218" width="60" height="6" rx="1" fill="#d1d5db"/>
  <rect x="20" y="228" width="110" height="5" rx="1" fill="#9ca3af"/>

  <!-- Section: Kenntnisse -->
  <rect x="20" y="248" width="80" height="8" rx="2" fill="#2563eb" opacity="0.8"/>
  <rect x="20" y="260" width="260" height="1" fill="#3b82f6" opacity="0.5"/>
  <!-- Skill pills -->
  <rect x="20" y="268" width="56" height="14" rx="7" fill="#3b82f6"/>
  <rect x="82" y="268" width="70" height="14" rx="7" fill="#3b82f6"/>
  <rect x="158" y="268" width="48" height="14" rx="7" fill="#3b82f6"/>
  <rect x="212" y="268" width="60" height="14" rx="7" fill="#3b82f6"/>
  <rect x="20" y="288" width="44" height="14" rx="7" fill="#3b82f6"/>
  <rect x="70" y="288" width="66" height="14" rx="7" fill="#3b82f6"/>
</svg>
